<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Scanner Pro</title>
    <!-- Importamos la librería de escaneo -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --text: #1e293b;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        h1 { text-align: center; font-size: 1.5rem; }

        #reader {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            border: none !important;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .history {
            margin-top: 20px;
        }

        .history-item {
            padding: 10px;
            border-bottom: 1px solid #e2e8f0;
            font-size: 0.9rem;
        }

        .history-item span {
            display: block;
            color: #64748b;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Escáner QR con Historial</h1>
    
    <!-- Botón para iniciar -->
    <button id="start-btn">Activar Cámara</button>
    
    <!-- Contenedor del video -->
    <div id="reader"></div>

    <div class="history">
        <h3>Registros Almacenados</h3>
        <div id="history-list">
            <!-- Aquí se insertarán los resultados -->
        </div>
    </div>
</div>

<script>
    const historyList = document.getElementById('history-list');
    const startBtn = document.getElementById('start-btn');
    const html5QrCode = new Html5Qrcode("reader");

    // Función para guardar y mostrar en el historial
    function saveResult(decodedText) {
        const now = new Date();
        const dateTime = `${now.toLocaleDateString()} ${now.toLocaleTimeString()}`;

        // Crear elemento en la interfaz
        const item = document.createElement('div');
        item.className = 'history-item';
        item.innerHTML = `
            <strong>Contenido:</strong> ${decodedText}
            <span>Fecha: ${dateTime}</span>
        `;
        
        // Insertar al inicio de la lista
        historyList.prepend(item);

        // Opcional: Guardar en el almacenamiento del navegador (localStorage)
        const record = { text: decodedText, date: dateTime };
        const saved = JSON.parse(localStorage.getItem('qr_logs') || '[]');
        saved.push(record);
        localStorage.setItem('qr_logs', JSON.stringify(saved));
    }

    const startScanner = () => {
        startBtn.style.display = 'none'; // Ocultar botón tras iniciar

        html5QrCode.start(
            { facingMode: "environment" }, // Prioriza cámara trasera
            {
                fps: 10,    // Fotogramas por segundo
                qrbox: { width: 250, height: 250 } // Cuadro de enfoque
            },
            (decodedText) => {
                // Éxito al escanear
                saveResult(decodedText);
                // Detenemos el escáner momentáneamente para evitar duplicados rápidos
                html5QrCode.stop().then(() => {
                    alert("Código capturado con éxito");
                    startBtn.style.display = 'block';
                    startBtn.innerText = "Escanear otro código";
                });
            },
            (errorMessage) => {
                // Error de lectura (común mientras busca el código)
            }
        ).catch((err) => {
            console.error("Error al iniciar cámara: ", err);
            alert("No se pudo acceder a la cámara.");
            startBtn.style.display = 'block';
        });
    };

    startBtn.addEventListener('click', startScanner);

    // Cargar historial previo al iniciar la página
    window.onload = () => {
        const saved = JSON.parse(localStorage.getItem('qr_logs') || '[]');
        saved.reverse().forEach(log => {
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerHTML = `<strong>Contenido:</strong> ${log.text} <span>Fecha: ${log.date}</span>`;
            historyList.appendChild(item);
        });
    };
</script>

</body>
</html>
